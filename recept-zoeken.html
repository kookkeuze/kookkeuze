<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="Logo/favicon-kookkeuze.png" />
  <meta name="theme-color" content="#63D671" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="Logo/apple-touch-icon-kookkeuze.png" />
  <title>Recept Zoeken | Kookkeuze</title>
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
  />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="recept-zoeken.css" />
</head>
<body class="recipe-search-page">
  <header class="topbar">
    <div class="topbar-inner">
      <a href="/" class="recipe-search-logo-link" aria-label="Ga naar de homepage van Kookkeuze">
        <img src="Logo/Kookkeuze-logo.svg" alt="Kookkeuze-logo" class="logo-img" />
      </a>
    </div>
  </header>

  <main class="container recipe-search-container">
    <section class="recipe-search-simple-shell">
      <div class="hero-random recipe-search-random-wrap">
        <button id="internetRandomBtn" type="button" class="green-btn recipe-search-random-btn">
          <i class="fas fa-shuffle" aria-hidden="true"></i>
          Random recept
        </button>
      </div>

      <div id="internetRecipeResult" class="recipe-search-empty-state">
        <p>Klik op de knop om een random recept op te halen.</p>
      </div>
    </section>
  </main>

  <script src="recept-zoeken.js"></script>
</body>
</html>
