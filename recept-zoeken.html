<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="Logo/favicon-kookkeuze.png" />
  <meta name="theme-color" content="#63D671" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="Logo/apple-touch-icon-kookkeuze.png" />
  <title>Recept Zoeken | Kookkeuze</title>
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
  />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="recept-zoeken.css" />
</head>
<body class="recipe-search-page">
  <header class="topbar">
    <div class="topbar-inner">
      <a href="/" class="recipe-search-logo-link" aria-label="Ga naar de homepage van Kookkeuze">
        <img src="Logo/Kookkeuze-logo.svg" alt="Kookkeuze-logo" class="logo-img" />
      </a>
    </div>
  </header>

  <main class="container recipe-search-container">
    <div class="hero-header">
      <h1>WAT ETEN WE VANDAAG?</h1>
      <p>Dezelfde tool als op de homepage, maar hier zoek je tussen recepten van bekende websites op internet.</p>
    </div>

    <div class="hero-filters">
      <select id="dishType">
        <option>Soort gerecht</option>
        <option>Kip</option>
        <option>Rund</option>
        <option>Varken</option>
        <option>Brood</option>
        <option>Hartig</option>
        <option>Hartige taart</option>
        <option>Ovenschotel</option>
        <option>Pasta</option>
        <option>Rijst</option>
        <option>Soep</option>
        <option>Taart &amp; cake</option>
        <option>Vegetarisch</option>
        <option>Vis</option>
        <option>Wraps</option>
        <option>Zoet</option>
      </select>

      <select id="mealCategory">
        <option>Menugang</option>
        <option>Bakken</option>
        <option>Dessert</option>
        <option>Dressings, sauzen & dips</option>
        <option>Drinken</option>
        <option>Hoofdgerecht</option>
        <option>Lunch</option>
        <option>Ontbijt</option>
        <option>Salade</option>
        <option>Snacks</option>
      </select>

      <select id="mealType">
        <option>Doel gerecht</option>
        <option>Sporten</option>
        <option>Normaal</option>
        <option>Cheaten</option>
      </select>

      <select id="timeRequired">
        <option>Tijd</option>
        <option>Onder de 30 minuten</option>
        <option>30 - 45 minuten</option>
        <option>45 minuten - 1 uur</option>
        <option>1 - 2 uur</option>
        <option>langer dan 2 uur</option>
      </select>

      <select id="calorieRange">
        <option>Calorieën</option>
        <option>Onder 100</option>
        <option>Onder 200</option>
        <option>Onder 300</option>
        <option>Onder 400</option>
        <option>Onder 500</option>
        <option>Onder 600</option>
        <option>Onder 700</option>
        <option>Onder 800</option>
        <option>Onder 900</option>
        <option>Onder 1000</option>
        <option>Boven 1000</option>
      </select>
    </div>

    <div class="hero-search">
      <input type="text" id="searchTerm" placeholder="Zoek bijvoorbeeld op 'kip', 'wraps' of 'pasta'" />
      <button id="searchBtn" class="pink-btn">ZOEK RECEPTEN</button>
    </div>

    <div class="hero-random recipe-search-random-wrap">
      <button id="randomBtn" class="green-btn">RANDOM</button>
    </div>

    <div id="result" class="recipe-search-result-shell">
      <div class="recipe-search-empty-state">
        <p>Kies filters en haal een internetrecept op.</p>
      </div>
    </div>
  </main>

  <script src="recept-zoeken.js"></script>
</body>
</html>
